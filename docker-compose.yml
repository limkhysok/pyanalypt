services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pyanalyptdb
      - POSTGRES_USER=pyanalyptdbXlimkhi
      - POSTGRES_PASSWORD=pyanalyptdbXlimkhi123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyanalyptdbXlimkhi -d pyanalyptdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production-12345
      - DATABASE_URL=postgres://pyanalyptdbXlimkhi:pyanalyptdbXlimkhi123@db:5432/pyanalyptdb
      - REDIS_URL=redis://redis:6379/1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
